name: Upstream Sync Check

on:
  schedule:
    - cron: '0 9 * * *'  # 毎日 9:00 UTC (18:00 JST)
  workflow_dispatch:
    inputs:
      force_check:
        description: '変更がなくてもIssueを作成する'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          LAST_SHA=$(jq -r '.last_synced_sha' .github/upstream-state.json)
          echo "last_sha=$LAST_SHA"
          echo "last_sha=$LAST_SHA" >> "$GITHUB_OUTPUT"

          LATEST_SHA=$(gh api repos/blader/humanizer/commits/main --jq '.sha')
          echo "new_sha=$LATEST_SHA"
          echo "new_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST_SHA" ]; then
            echo "ERROR: Failed to fetch upstream SHA"
            exit 1
          fi

          if [ "$LAST_SHA" = "$LATEST_SHA" ] && [ "${{ inputs.force_check }}" != "true" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Upstream changes detected: $LAST_SHA -> $LATEST_SHA"
          fi

      - name: Check for existing open issue
        id: existing
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "upstream-sync" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "issue_number=${EXISTING}"
          echo "issue_number=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Comment on existing issue
        if: |
          steps.check.outputs.has_changes == 'true' &&
          steps.existing.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          OLD_SHA: ${{ steps.check.outputs.last_sha }}
          NEW_SHA: ${{ steps.check.outputs.new_sha }}
          ISSUE: ${{ steps.existing.outputs.issue_number }}
        run: |
          COMPARE_URL="https://github.com/blader/humanizer/compare/${OLD_SHA:0:7}...${NEW_SHA:0:7}"

          gh issue comment "$ISSUE" \
            --repo "${{ github.repository }}" \
            --body "## 追加のアップストリーム変更が検知されました

          **新しいコミット**: [\`${OLD_SHA:0:7}...${NEW_SHA:0:7}\`](${COMPARE_URL})

          このIssueが解決される前にさらに変更がありました。上記のcompare URLで差分を確認してください。"

      - name: Build issue body and create issue
        if: |
          steps.check.outputs.has_changes == 'true' &&
          steps.existing.outputs.issue_number == ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          OLD_SHA: ${{ steps.check.outputs.last_sha }}
          NEW_SHA: ${{ steps.check.outputs.new_sha }}
        run: |
          set -e
          COMPARE_URL="https://github.com/blader/humanizer/compare/${OLD_SHA:0:7}...${NEW_SHA:0:7}"

          # コミット一覧と変更ファイルを取得
          COMPARE_DATA=$(gh api "repos/blader/humanizer/compare/${OLD_SHA}...${NEW_SHA}")
          COMMIT_COUNT=$(echo "$COMPARE_DATA" | jq '.commits | length')
          COMMIT_LIST=$(echo "$COMPARE_DATA" | jq -r \
            '.commits[] | "- [`\(.sha[0:7])`](https://github.com/blader/humanizer/commit/\(.sha)) \(.commit.message | split("\n")[0])"')
          FILE_LIST=$(echo "$COMPARE_DATA" | jq -r \
            '.files[] | "- `\(.filename)` (\(.status), +\(.additions) -\(.deletions))"')

          BODY="## アップストリーム変更検知 / Upstream Changes Detected

          **Upstream**: [blader/humanizer](https://github.com/blader/humanizer)
          **変更数 / Commits**: ${COMMIT_COUNT}
          **比較 / Compare**: [${OLD_SHA:0:7}...${NEW_SHA:0:7}](${COMPARE_URL})

          ## コミット一覧 / Commits

          ${COMMIT_LIST}

          ## 変更ファイル / Changed Files

          ${FILE_LIST}

          ---

          <!-- upstream-new-sha: ${NEW_SHA} -->

          @claude 上記のアップストリーム変更を日本語版(humanizer-ja)に適応してください。

          **手順**:
          1. 比較URL (${COMPARE_URL}) でアップストリームの変更内容を確認する
          2. SKILL.md、README.md、WARP.mdの現在の内容を読む
          3. 各変更について日本語版への適応要否を判断する（CLAUDE.mdの適応ルールに従う）
          4. 適応変更をSKILL.md/README.md/WARP.mdに適用し、\`upstream-sync\`ラベルのPRを作成する
          5. PRのdescriptionに \`<!-- upstream-new-sha: ${NEW_SHA} -->\` を必ず含めること
          6. 変更が不要な場合はその理由をコメントしてPR作成をスキップする"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "upstream-sync: ${COMMIT_COUNT} new commit(s) in blader/humanizer (${NEW_SHA:0:7})" \
            --body "$BODY" \
            --label "upstream-sync"

      - name: No changes found
        if: steps.check.outputs.has_changes == 'false'
        env:
          LAST_SHA: ${{ steps.check.outputs.last_sha }}
        run: |
          echo "No upstream changes detected. Last synced SHA: $LAST_SHA"
